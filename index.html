<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TALLER ABECEDARIO</title>
</head>
<body>

    <header>
        <nav class="nav">
            <h1 class="nav__title">EL ABC DIVERTIDO</h1>
            <p class="nav__text">Letras vistas <span>0</span></p>
        </nav>

        <div class="buttons-container">
            <button class="buttons-container__button">TODAS</button>
            <button class="buttons-container__button button--bg">VOCALES</button>
        </div>
    </header>

    <main>
        <!-- Primeras letras -->
        <div class="letters__container">

            <!-- LETRA A -->
            <div class="letters__card" style="--color: #ff9797">
                <p class="letters_letter">A</p>
            </div>

            <!-- LETRA B -->
            <div class="letters__card" style="--color: #ffd6a5">
                <p class="letters_letter">B</p>
            </div>

            <!-- LETRA C -->
            <div class="letters__card" style="--color: #fdffb6">
                <p class="letters_letter">C</p>
            </div>

            <!-- LETRA D -->
            <div class="letters__card" style="--color: #caffbf">
                <p class="letters_letter">D</p>
            </div>

            <!-- LETRA E -->
            <div class="letters__card" style="--color: #9bf6ff">
                <p class="letters_letter">E</p>
            </div>

            <!-- LETRA F -->
            <div class="letters__card" style="--color: #a0c4ff">
                <p class="letters_letter">F</p>
            </div>

            <!-- LETRA G -->
            <div class="letters__card" style="--color: #bdb2ff">

            </div>

            <!-- LETRA H -->
            <div class="letters__card" style="--color: #ffc6ff">

            </div>

            <!-- LETRA I -->
            <div class="letters__card" style="--color: #caffbf">
                <p class="letters_letter">I</p>
            </div>

            <!-- LETRA J -->
            <div class="letters__card" style="--color: #fdffb6">
                <p class="letters_letter">J</p>
            </div>

            <!-- LETRA K -->
            <div class="letters__card" style="--color: #ff9797">
                <p class="letters_letter">K</p>
            </div>

            <!-- LETRA L -->
            <div class="letters__card" style="--color: #ffc6ff">
                <p class="letters_letter">L</p>
            </div>

        </div>
    </main>
    
</body>
</html>
